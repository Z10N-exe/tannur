[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tannur-python"
version = "0.1.0"
description = "Official Python SDK for Tannur Event-Sourced BaaS with sync/async support"
readme = "README.md"
license = "MIT"
authors = [
    { name = "Z10N-exe" },
]
keywords = ["tannur", "event-sourcing", "baas", "python", "async", "sync"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.8"
dependencies = [
    "httpx>=0.24.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "hypothesis>=6.0.0",
    "black>=23.0.0",
    "isort>=5.0.0",
    "mypy>=1.0.0",
]

[project.urls]
Homepage = "https://github.com/Z10N-exe/tannur"
Repository = "https://github.com/Z10N-exe/tannur.git"
Documentation = "https://docs.tannur.dev"

[tool.hatch.build.targets.wheel]
packages = ["src/tannur"]

[tool.black]
line-length = 88
target-version = ["py38"]

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.8"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--cov=src/tannur --cov-report=term-missing"